port = 8080

# Secret reference formats (used for atlassian.token and agent.keys):
#   "env:VAR_NAME"                                      - read from environment variable
#   "aws:secretsmanager:<secret-id>"                    - AWS Secrets Manager (plain string secret)
#   "gcp:secretmanager:<project>/<secret>"              - GCP Secret Manager latest version
#   "gcp:secretmanager:projects/<project>/secrets/<secret>/versions/<version>"
#                                                       - GCP Secret Manager specific version
#
# <secret-id> for AWS can be a secret name, partial ARN, or full ARN.
# The returned secret string is used as-is; JSON sub-key extraction is not supported yet.

[atlassian]
# Atlassian Cloud credentials. `email` and `token` are required for Basic Auth.
# `cloud_id` is preferred for REST calls; if omitted, `base_url` is used as a
# fallback (mainly useful for tests or on-prem installs).
#
# Find cloud_id by signing in to your Atlassian site and opening:
#   https://<your-domain>.atlassian.net/_edge/tenant_info
# The `cloudId` field is a UUID-like string.
# email = "agent@example.com"
# cloud_id = "12345678-1234-1234-1234-123456789abc"
# base_url = "https://your-domain.atlassian.net"

# Secret references also work for email and cloud_id:
# email = "gcp:secretmanager:my-project/atlassian-email"
# cloud_id = "gcp:secretmanager:my-project/atlassian-cloud-id"
# email = "aws:secretsmanager:prod/atlassian/email"
# cloud_id = "aws:secretsmanager:prod/atlassian/cloud-id"

# Server-injected token used for Basic Auth. Create an API token at:
# https://id.atlassian.com/manage-profile/security/api-tokens
# Choose one of the secret reference examples below:
# token = "env:ATLASSIAN_TOKEN"                       # local environment variable
# token = "aws:secretsmanager:prod/atlassian/token"   # AWS Secrets Manager
# token = "gcp:secretmanager:my-project/atlassian-token"  # GCP Secret Manager latest
# token = "gcp:secretmanager:projects/my-project/secrets/atlassian-token/versions/1"

[mcp]
# Reserved fields. The server currently does not gate the /mcp endpoint on
# `enabled` nor apply a global `enable_writes` default. The /health and /stats
# endpoints are always available, and write-gating is controlled per-agent via
# `agents.enable_writes` below.
enabled = false
# enable_writes = false

[audit]
# Path to the JSONL fail-closed audit log. Write tools record an "attempt" line
# before the upstream call; if this write fails, the request is rejected.
# Defaults to "atlapool-audit.jsonl" in the working directory if omitted.
# path = "/var/lib/atlapool/audit.jsonl"

# [[agents]]
# Each agent is an MCP client. It gets its own key(s), tool allowlist,
# project/space allowlist, and write-gate flag. A missing tool/project/space
# list is treated as empty (deny-by-default).
#
# id = "demo-agent"
#
# One or more secret references for X-Atlapool-Key headers.
# keys = ["env:ATLAPOOL_KEY_DEMO"]
# keys = ["aws:secretsmanager:prod/atlapool/agent-key"]
# keys = ["gcp:secretmanager:my-project/agent-key"]
#
# projects: Jira project keys the agent may access. Supports glob '*'.
#   - "PROJ-X" matches exactly PROJ-X
#   - "PROJ/*" matches any string, including slashes
# projects = ["PROJ-X", "PROJ/*"]
#
# spaces: Confluence space keys the agent may access. Supports glob '*'.
# spaces = ["SPACE-Y", "SPACE/*"]
#
# tools: exact tool names this agent may call.
# Implemented tools: jira_get_issue, jira_create_issue, jira_add_comment, confluence_get_page
# tools = ["jira_get_issue", "jira_create_issue", "jira_add_comment", "confluence_get_page"]
#
# enable_writes: must be true for any non-read tool (jira_create_issue, jira_add_comment).
# Read tools such as jira_get_issue and confluence_get_page work when false.
# enable_writes = false
