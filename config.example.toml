port = 8080

# Secret reference formats:
#   "env:VAR_NAME"                                    — from environment variable
#   "aws:secretsmanager:<secret-id>"                  — from AWS Secrets Manager (plain string secret)
#   "gcp:secretmanager:<project>/<secret>"            — from GCP Secret Manager (latest version)
#   "gcp:secretmanager:projects/<project>/secrets/<secret>/versions/<version>" — from GCP Secret Manager
#
# <secret-id> can be a secret name or a full ARN. The returned secret string
# is used as-is; JSON sub-key extraction is not supported yet.

[atlassian]
# base_url = "https://your-domain.atlassian.net"
# token = "env:ATLASSIAN_TOKEN"                    # F5-a: env variable
# token = "aws:secretsmanager:prod/atlassian/token" # F5-b: AWS Secrets Manager
# token = "gcp:secretmanager:my-project/atlassian-token"  # F5-c: GCP Secret Manager

[mcp]
enabled = false
# session_ttl_secs = 3600

[audit]
# F7: JSONL audit log for write operations. Defaults to atlapool-audit.jsonl in cwd.
# path = "/var/lib/atlapool/audit.jsonl"

# [[agents]]
# id = "demo-agent"
# keys = ["env:ATLAPOOL_KEY_DEMO"]
# keys = ["aws:secretsmanager:prod/atlapool/agent-key"]
# projects = ["PROJ-X", "PROJ/*"]   # '*' matches any sequence, including path separators
# spaces = ["SPACE-Y", "SPACE/*"]
