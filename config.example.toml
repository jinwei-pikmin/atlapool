port = 8080

# Secret reference formats (used for atlassian.token and agent.keys):
#   "env:VAR_NAME"                                      - read from environment variable
#   "aws:secretsmanager:<secret-id>"                    - AWS Secrets Manager (plain string secret)
#   "gcp:secretmanager:<project>/<secret>"              - GCP Secret Manager latest version
#   "gcp:secretmanager:projects/<project>/secrets/<secret>/versions/<version>"
#                                                       - GCP Secret Manager specific version
#
# <secret-id> for AWS can be a secret name, partial ARN, or full ARN.
# The returned secret string is used as-is; JSON sub-key extraction is not supported yet.

[atlassian]
# Atlassian Cloud credentials. For Service Account scoped tokens, only `token`
# and `cloud_id` are required; the token is sent as `Authorization: Bearer <token>`.
# `cloud_id` is preferred for REST calls; if omitted, `base_url` is used as a
# fallback (mainly useful for tests or on-prem installs).
#
# Find cloud_id by signing in to your Atlassian site and opening:
#   https://<your-domain>.atlassian.net/_edge/tenant_info
# The `cloudId` field is a UUID-like string.
# cloud_id = "12345678-1234-1234-1234-123456789abc"
# base_url = "https://your-domain.atlassian.net"

# `cloud_id` also supports secret references:
# cloud_id = "gcp:secretmanager:my-project/atlassian-cloud-id"
# cloud_id = "aws:secretsmanager:prod/atlassian/cloud-id"

# Server-injected token sent as `Authorization: Bearer <token>`.
# For Service Account scoped tokens, store the token here and grant the needed
# Atlassian OAuth scopes in the Atlassian admin console:
#   - Jira: read:jira-work / write:jira-work
#   - Confluence: read:page:confluence, write:page:confluence,
#                 read:comment:confluence, write:comment:confluence,
#                 read:attachment:confluence, write:attachment:confluence
# Choose one of the secret reference examples below:
# token = "env:ATLASSIAN_TOKEN"                       # local environment variable
# token = "aws:secretsmanager:prod/atlassian/token"   # AWS Secrets Manager
# token = "gcp:secretmanager:my-project/atlassian-token"  # GCP Secret Manager latest
# token = "gcp:secretmanager:projects/my-project/secrets/atlassian-token/versions/1"

[bitbucket]
# Bitbucket Cloud credentials. `workspace` is used as the default workspace for
# all bitbucket_* tool calls. `base_url` is optional and defaults to the
# Bitbucket Cloud REST API gateway (https://api.bitbucket.org/2.0); override it
# for tests or private installs.
# workspace = "my-workspace"
# base_url = "https://api.bitbucket.org/2.0"
#
# Authentication: choose either a long-lived `token` or short-lived OAuth.
#
# Option A: static token (App password, Workspace/Project access token, or
# long-lived OAuth access token). Workspace/Project access tokens require
# Bitbucket Premium and are tied to the workspace, not a user.
# Required Bitbucket App password / OAuth consumer permissions:
#   - read: repository:read, pullrequest:read
#   - write: repository:write, pullrequest:write
#   - create repository: repository:admin (Bitbucket requires admin scope for repo creation)
# token supports the same secret reference formats as atlassian.token:
# token = "env:BITBUCKET_TOKEN"
# token = "aws:secretsmanager:prod/bitbucket/token"
# token = "gcp:secretmanager:my-project/bitbucket-token"
#
# Option B: OAuth 2.0 client credentials grant.
# The client_id / client_secret come from a Bitbucket OAuth consumer.
# atlapool will fetch and cache a 2-hour access token and refresh it before
# expiry. Scopes are controlled by the consumer, not atlapool.
# [bitbucket.oauth]
# client_id = "env:BITBUCKET_CLIENT_ID"
# client_secret = "env:BITBUCKET_CLIENT_SECRET"
# token_url = "https://bitbucket.org/site/oauth2/access_token"  # optional

[mcp]
# enabled: when false, the /mcp endpoint returns 503 Service Unavailable.
# /health and /stats are always available.
enabled = false

# enable_writes: global default for the write-gate. Per-agent `enable_writes`
# takes precedence when set (true or false). If an agent leaves `enable_writes`
# unset, this value is used.
# enable_writes = false

[audit]
# Path to the JSONL fail-closed audit log. Write tools record an "attempt" line
# before the upstream call; if this write fails, the request is rejected.
# Defaults to "atlapool-audit.jsonl" in the working directory if omitted.
# path = "/var/lib/atlapool/audit.jsonl"

# [[agents]]
# Each agent is an MCP client. It gets its own key(s), tool allowlist,
# project/space allowlist, and write-gate flag. A missing tool/project/space
# list is treated as empty (deny-by-default).
#
# id = "demo-agent"
#
# One or more secret references for X-Atlapool-Key headers.
# keys = ["env:ATLAPOOL_KEY_DEMO"]
# keys = ["aws:secretsmanager:prod/atlapool/agent-key"]
# keys = ["gcp:secretmanager:my-project/agent-key"]
#
# projects: Jira project keys the agent may access. Supports glob '*'.
#   - "PROJ-X" matches exactly PROJ-X
#   - "PROJ/*" matches any string, including slashes
# projects = ["PROJ-X", "PROJ/*"]
#
# spaces: Confluence space keys the agent may access. Supports glob '*'.
# spaces = ["SPACE-Y", "SPACE/*"]
#
# bitbucket_workspaces: Bitbucket workspace slugs the agent may access. Supports glob '*'.
# bitbucket_workspaces = ["WORKSPACE", "WORKSPACE/*"]
#
# bitbucket_repos: Bitbucket repository slugs the agent may access. Supports glob '*'.
# bitbucket_repos = ["my-repo", "my-repo/*"]
#
# tools: exact tool names this agent may call.
# Implemented tools: jira_get_issue, jira_create_issue, jira_add_comment,
#   jira_update_issue, jira_get_transitions, jira_transition_issue,
#   jira_search_issues,
#   confluence_get_page, confluence_create_page, confluence_update_page,
#   bitbucket_get_repo, bitbucket_get_pull_request, bitbucket_get_pipeline_status,
#   bitbucket_get_pull_request_diff,
#   bitbucket_list_pull_requests, bitbucket_list_pull_request_changes,
#   bitbucket_list_branches, bitbucket_list_directory, bitbucket_get_file_content,
#   bitbucket_create_repo, bitbucket_create_branch, bitbucket_create_commit,
#   bitbucket_create_pull_request, bitbucket_merge_pull_request,
#   bitbucket_decline_pull_request, bitbucket_delete_branch,
#   bitbucket_add_pull_request_comment
# tools = ["jira_get_issue", "jira_create_issue", "jira_add_comment",
#          "jira_update_issue", "jira_get_transitions", "jira_transition_issue",
#          "jira_search_issues",
#          "confluence_get_page", "confluence_create_page", "confluence_update_page",
#          "bitbucket_get_repo", "bitbucket_get_pull_request",
#          "bitbucket_get_pipeline_status",
#          "bitbucket_get_pull_request_diff",
#          "bitbucket_list_pull_requests", "bitbucket_list_pull_request_changes",
#          "bitbucket_list_branches", "bitbucket_list_directory",
#          "bitbucket_get_file_content",
#          "bitbucket_create_repo", "bitbucket_create_branch",
#          "bitbucket_create_commit", "bitbucket_create_pull_request",
#          "bitbucket_merge_pull_request", "bitbucket_decline_pull_request",
#          "bitbucket_delete_branch",
#          "bitbucket_add_pull_request_comment"]
#
# enable_writes: when true, the agent may call write tools. If omitted, the global
# [mcp] enable_writes value is used. Setting this explicitly to false overrides a
# global true. Write tools: jira_create_issue, jira_add_comment, jira_update_issue,
# jira_transition_issue, confluence_create_page, confluence_update_page,
# bitbucket_create_repo, bitbucket_create_branch, bitbucket_create_commit,
# bitbucket_create_pull_request, bitbucket_merge_pull_request,
# bitbucket_decline_pull_request, bitbucket_delete_branch,
# bitbucket_add_pull_request_comment.
# Read tools such as jira_get_issue, jira_get_transitions, confluence_get_page,
# bitbucket_get_repo, bitbucket_get_pull_request, bitbucket_list_pull_requests,
# bitbucket_list_pull_request_changes, bitbucket_list_branches,
# bitbucket_list_directory, bitbucket_get_file_content work when false.
# enable_writes = false
