name: Publish image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jinwei-pikmin/atlapool
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short
            type=ref,event=tag

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GHCR package is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="atlapool"
          API="orgs/${{ github.repository_owner }}/packages/container/${PKG}"
          STATUS=$(gh api "${API}" --jq '.visibility' 2>/dev/null || echo "unknown")
          echo "Current visibility for ${PKG}: ${STATUS}"
          if [ "$STATUS" != "public" ]; then
            echo "Setting ${PKG} visibility to public..."
            gh api --method PATCH "${API}" --field visibility=public \
              && echo "✓ Package is now public" \
              || echo "⚠ Could not set visibility (org admin may need to set it manually)"
          fi
